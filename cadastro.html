<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro_style.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Cadastro - NeoRun</title>
</head>
<body>

    <main class="pagina-cadastro">

        <section class="card-cadastro">

            <h1 class="titulo-cadastro">Criar Conta</h1>
 
            <form action="login.html" method="POST">
                <div class="grupo-input">
                    <input type="text" placeholder="👤 Nome completo" name="usuario" id="iUsuario" autocomplete="username" minlength="5" maxlength="25" required>
                </div>

                <div class="grupo-input">
                    <input type="email" placeholder="✉ Email" autocomplete="email" required>
                </div>

                <div class="grupo-input">
                    <input type="password" name="criarSenha" id="iCriarSenha" placeholder="🔒 Senha" minlength="8" maxlength="20" autocomplete="current-password">
                    
                </div>

                <div class="grupo-input">
                    <input type="password" placeholder="🔒 Confirmar senha" required>
                </div>

                <input type="submit" value="Cadastrar" class="botao-cadastro">
            </form>

            <div class="links-cadastro">
                <a href="login.html">Já tenho conta</a>
            </div>

        </section>

    </main>

</body>
</html>
